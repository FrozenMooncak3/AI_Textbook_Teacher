services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://dev:dev@db:5432/textbook_teacher
      - OCR_SERVER_URL=http://ocr:8000
      - OCR_SERVER_TOKEN=${OCR_SERVER_TOKEN}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - AI_MODEL=${AI_MODEL:-anthropic:claude-sonnet-4-6}
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_BUCKET=${R2_BUCKET}
    depends_on:
      - db
      - ocr
    volumes:
      - uploads:/app/data/uploads

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=textbook_teacher
      - POSTGRES_USER=dev
      - POSTGRES_PASSWORD=dev
    volumes:
      - pgdata:/var/lib/postgresql/data

  ocr:
    build:
      context: .
      dockerfile: Dockerfile.ocr
    environment:
      - OCR_HOST=0.0.0.0
      - OCR_PORT=8000
      - OCR_PROVIDER=${OCR_PROVIDER:-google}
      - OCR_SERVER_TOKEN=${OCR_SERVER_TOKEN}
      - NEXT_CALLBACK_URL=${NEXT_CALLBACK_URL:-http://app:3000/api/ocr/callback}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - SENTRY_ENVIRONMENT=${SENTRY_ENVIRONMENT:-development}
      - GOOGLE_CLOUD_PROJECT_ID=${GOOGLE_CLOUD_PROJECT_ID:-}
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS:-}
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_BUCKET=${R2_BUCKET}
    # 本地用 Google Vision 需要：
    # 1. 在 Google Cloud Console 下载 SA key JSON
    # 2. 放到 ./secrets/gcp-key.json
    # 3. 取消下面注释：
    # volumes:
    #   - ./secrets/gcp-key.json:/app/gcp-key.json:ro
    # environment:
    #   - GOOGLE_APPLICATION_CREDENTIALS=/app/gcp-key.json
    volumes:
      - uploads:/app/data/uploads

volumes:
  pgdata:
  uploads:
