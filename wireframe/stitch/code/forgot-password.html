        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

<body class="bg-surface-container-low min-h-screen font-body text-on-surface flex flex-col items-center justify-center p-6">
<!-- Header / TopAppBar -->
<header class="w-full top-0 sticky bg-[#fffbff] dark:bg-slate-950 flex justify-between items-center px-6 py-4 max-w-7xl mx-auto rounded-b-2xl mb-12">
<div class="flex items-center gap-2">
<span class="text-[#a74800] dark:text-[#ff7a23] font-black text-2xl tracking-tight font-headline">学伴 Companion</span>
</div>
<div class="flex items-center gap-4">
<button class="material-symbols-outlined text-[#39382d] dark:text-slate-400 hover:opacity-80 transition-opacity">help_outline</button>
</div>
</header>
<main class="flex flex-col lg:flex-row gap-10 w-full max-w-6xl justify-center items-stretch">
<!-- LEFT CARD (Input State) -->
<section class="bg-surface-container-lowest rounded-xl p-10 w-full max-w-[420px] soft-amber-shadow flex flex-col items-center border border-outline-variant/10">
<div class="mb-8 flex flex-col items-center gap-3">
<div class="w-16 h-16 rounded-2xl amber-glow flex items-center justify-center text-white shadow-lg">
<span class="material-symbols-outlined text-4xl" data-icon="auto_stories" style="font-variation-settings: 'FILL' 1;">auto_stories</span>
</div>
<h1 class="font-headline font-bold text-xl text-primary tracking-tight">AI 教材精学老师</h1>
</div>
<div class="text-center mb-10">
<h2 class="font-headline font-extrabold text-3xl mb-3 text-on-surface">重置密码</h2>
<p class="text-on-surface-variant leading-relaxed">输入你的注册邮箱，我们将发送重置链接</p>
</div>
<form class="w-full space-y-6">
<div class="space-y-2">
<label class="block text-sm font-semibold text-on-surface-variant ml-1">邮箱</label>
<input class="w-full px-5 py-4 bg-surface-container rounded-lg border-none focus:ring-2 focus:ring-primary/20 transition-all placeholder:text-outline text-on-surface" placeholder="your@email.com" type="email"/>
</div>
<button class="w-full amber-glow text-on-primary font-bold py-4 rounded-lg shadow-md hover:scale-[0.98] transition-transform duration-150" type="submit">
                    发送重置链接
                </button>
</form>
<a class="mt-8 text-on-surface-variant text-sm hover:text-primary transition-colors flex items-center gap-1 font-medium" href="#">
<span class="material-symbols-outlined text-base">arrow_back_ios</span>
                返回登录
            </a>
</section>
<!-- RIGHT CARD (Confirmation State) -->
<section class="bg-surface-container-lowest rounded-xl p-10 w-full max-w-[420px] soft-amber-shadow flex flex-col items-center border border-outline-variant/10">
<div class="mb-8 flex flex-col items-center gap-3">
<div class="w-16 h-16 rounded-2xl amber-glow flex items-center justify-center text-white shadow-lg">
<span class="material-symbols-outlined text-4xl" data-icon="auto_stories" style="font-variation-settings: 'FILL' 1;">auto_stories</span>
</div>
<h1 class="font-headline font-bold text-xl text-primary tracking-tight">AI 教材精学老师</h1>
</div>
<div class="flex-1 flex flex-col items-center justify-center text-center">
<div class="mb-6 relative">
<div class="w-24 h-24 rounded-full bg-secondary-container/30 flex items-center justify-center">
<span class="material-symbols-outlined text-6xl text-primary-fixed-dim" data-icon="mail">mail</span>
</div>
<div class="absolute -bottom-1 -right-1 w-10 h-10 bg-tertiary-fixed rounded-full border-4 border-surface-container-lowest flex items-center justify-center">
<span class="material-symbols-outlined text-on-tertiary-fixed font-bold" data-icon="check" style="font-variation-settings: 'wght' 700;">check</span>
</div>
</div>
<h2 class="font-headline font-extrabold text-3xl mb-3 text-on-surface">重置链接已发送</h2>
<p class="text-on-surface-variant leading-relaxed mb-4">
                    请检查 <span class="font-bold text-on-surface">s***@email.com</span> 的收件箱
                </p>
<p class="text-sm text-on-surface-variant">
                    没收到? <a class="text-primary font-bold hover:underline" href="#">重新发送</a>
</p>
</div>
<button class="w-full mt-10 border-2 border-primary text-primary font-bold py-4 rounded-lg hover:bg-primary/5 transition-colors">
                返回登录
            </button>
</section>
</main>
<!-- Footer -->
<footer class="w-full py-8 flex flex-col items-center gap-4 mt-auto">
<div class="flex gap-6 text-on-surface-variant/60 text-sm font-body">
<a class="hover:text-[#f97316] transition-colors cursor-pointer" href="#">隐私政策</a>
