<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>注册 - AI 教材精学老师</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Be_Vietnam_Pro:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-surface-variant": "#666558",
                    "secondary-fixed": "#ffc69d",
                    "on-primary-container": "#3f1700",
                    "inverse-primary": "#f77113",
                    "tertiary-fixed-dim": "#efad16",
                    "on-primary-fixed": "#000000",
                    "surface-container": "#f8f4e2",
                    "outline": "#838174",
                    "primary-fixed-dim": "#f06c0b",
                    "secondary-dim": "#894700",
                    "on-primary-fixed-variant": "#4e1e00",
                    "on-tertiary-fixed": "#3c2900",
                    "error-dim": "#b92902",
                    "on-tertiary": "#ffffff",
                    "on-secondary-fixed": "#542900",
                    "on-secondary": "#ffffff",
                    "on-error": "#ffffff",
                    "primary-dim": "#943f00",
                    "outline-variant": "#bcb9ab",
                    "tertiary-dim": "#755200",
                    "surface-variant": "#ece9d4",
                    "surface-bright": "#fffbff",
                    "error": "#be2d06",
                    "surface-container-highest": "#ece9d4",
                    "primary": "#a74800",
                    "on-secondary-fixed-variant": "#7e4000",
                    "surface-container-low": "#fefae8",
                    "on-error-container": "#520c00",
                    "secondary-container": "#ffc69d",
                    "tertiary-fixed": "#febb28",
                    "on-primary": "#ffffff",
                    "secondary-fixed-dim": "#ffb379",
                    "primary-fixed": "#ff7a23",
                    "primary-container": "#ff7a23",
                    "surface": "#fffbff",
                    "on-background": "#39382d",
                    "background": "#fffbff",
                    "error-container": "#f95630",
                    "surface-dim": "#e7e3ce",
                    "secondary": "#9b5100",
                    "tertiary-container": "#febb28",
                    "surface-container-lowest": "#ffffff",
                    "on-secondary-container": "#703900",
                    "inverse-on-surface": "#a09d8f",
                    "on-tertiary-container": "#563b00",
                    "tertiary": "#845d00",
                    "on-tertiary-fixed-variant": "#614400",
                    "inverse-surface": "#0f0f06",
                    "surface-tint": "#a74800",
                    "surface-container-high": "#f2eedb",
                    "on-surface": "#39382d"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Be Vietnam Pro"],
                    "label": ["Plus Jakarta Sans"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }
        .amber-glow {
            background: linear-gradient(135deg, #a74800 0%, #ff7a23 100%);
        }
        body {
            background-color: #fffaf0; /* Warm cream base */
            background-image: radial-gradient(at 0% 0%, rgba(254, 250, 232, 1) 0, transparent 50%), 
                              radial-gradient(at 100% 100%, rgba(255, 198, 157, 0.15) 0, transparent 50%);
        }
    </style>
</head>
<body class="font-body text-on-surface min-h-screen flex flex-col items-center justify-center p-6 selection:bg-secondary-container">
<!-- Main Registration Card -->
<main class="w-full max-w-[420px] bg-surface-container-lowest rounded-xl p-10 shadow-[0_40px_80px_-20px_rgba(167,72,0,0.06)] relative overflow-hidden">
<!-- Decoration: Subtle Amber Glow in corner -->
<div class="absolute -top-12 -right-12 w-32 h-32 bg-primary-container/10 rounded-full blur-3xl"></div>
<!-- Header Section -->
<header class="text-center mb-8 relative z-10">
<div class="inline-flex items-center justify-center w-16 h-16 bg-surface-container-low rounded-full mb-4">
<span class="material-symbols-outlined text-primary-container text-4xl" data-icon="auto_stories">auto_stories</span>
<span class="material-symbols-outlined text-primary text-xl absolute translate-x-5 -translate-y-4" data-icon="sparkles" data-weight="fill" style="font-variation-settings: 'FILL' 1;">colors_spark</span>
</div>
<h1 class="font-headline text-2xl font-extrabold text-on-surface tracking-tight mb-2">AI 教材精学老师</h1>
<p class="text-on-surface-variant font-medium">创建你的学习账号</p>
</header>
<!-- Form Content -->
<section class="space-y-6 relative z-10">
<!-- Invite Code Badge -->
<div class="flex justify-center">
<div class="inline-flex items-center gap-1.5 px-3 py-1 bg-emerald-50 text-emerald-700 text-sm font-semibold rounded-full border border-emerald-100/50">
<span class="material-symbols-outlined text-base" data-icon="check_circle" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check_circle</span>
                    邀请码已应用
                </div>
</div>
<form class="space-y-5">
<!-- Display Name -->
<div class="space-y-1.5">
<label class="block text-sm font-bold text-on-surface ml-1">显示名称</label>
<input class="w-full px-5 py-3.5 bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-primary/20 focus:bg-surface-bright transition-all placeholder:text-on-surface-variant/40 text-on-surface" placeholder="你的昵称" type="text"/>
</div>
<!-- Email -->
<div class="space-y-1.5">
<label class="block text-sm font-bold text-on-surface ml-1">邮箱</label>
<input class="w-full px-5 py-3.5 bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-primary/20 focus:bg-surface-bright transition-all placeholder:text-on-surface-variant/40 text-on-surface" placeholder="your@email.com" type="email"/>
</div>
<!-- Password -->
<div class="space-y-1.5">
<label class="block text-sm font-bold text-on-surface ml-1">密码</label>
<div class="relative">
<input class="w-full px-5 py-3.5 bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-primary/20 focus:bg-surface-bright transition-all placeholder:text-on-surface-variant/40 text-on-surface" placeholder="至少 8 位" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant/60 hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
<p class="text-[11px] text-on-surface-variant/70 leading-relaxed px-1">至少8个字符，包含字母和数字</p>
</div>
<!-- Confirm Password -->
<div class="space-y-1.5">
<label class="block text-sm font-bold text-on-surface ml-1">确认密码</label>
<input class="w-full px-5 py-3.5 bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-primary/20 focus:bg-surface-bright transition-all placeholder:text-on-surface-variant/40 text-on-surface" placeholder="再次输入密码" type="password"/>
</div>
<!-- Action Button -->
<div class="pt-2">
<button class="amber-glow w-full py-4 text-white font-bold rounded-lg shadow-lg shadow-primary/20 hover:scale-[1.01] active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
                        注册
                        <span class="material-symbols-outlined text-xl" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</form>
<!-- Secondary Action -->
<div class="text-center pt-2">
<p class="text-sm text-on-surface-variant">
                    已有账号? <a class="text-primary-fixed-dim font-bold hover:underline underline-offset-4 decoration-2" href="#">登录</a>
</p>
</div>
</section>
</main>
<!-- Footer -->
<footer class="mt-8 text-center space-y-4">
<p class="font-body text-xs tracking-wider text-on-surface-variant/60">
            @ 2026 AI 教材精学老师
        </p>
<!-- Minimalistic Footer Links from JSON inspiration -->
<div class="flex items-center justify-center gap-6 text-[11px] font-medium text-on-surface-variant/40">
<a class="hover:text-primary transition-colors" href="#">使用条款</a>
<div class="w-1 h-1 rounded-full bg-outline-variant/30"></div>
<a class="hover:text-primary transition-colors" href="#">隐私政策</a>
<div class="w-1 h-1 rounded-full bg-outline-variant/30"></div>
<a class="hover:text-primary transition-colors" href="#">联系我们</a>
</div>
</footer>
</body></html>
